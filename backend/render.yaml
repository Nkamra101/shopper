services:
  - type: web
    name: shopper-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false

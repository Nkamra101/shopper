databases:
  - name: shopper-db
    plan: free
    databaseName: shopper_prod
    user: shopper_admin

services:
  - type: web
    name: shopper-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SEED_ON_STARTUP
        value: "false"
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_URL
        fromDatabase:
          name: shopper-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
